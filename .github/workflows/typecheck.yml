name: Typecheck

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  tsc:
    name: tsc --noEmit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: TypeScript typecheck
        run: bunx tsc --noEmit
